server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle Astro static files and subdirectories
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    # This ensures relative fetches like fetch('/api/...') work correctly
    location /api/ {
        proxy_pass https://backend-skillfest.nstsdc.org/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host backend-skillfest.nstsdc.org;
        proxy_cache_bypass $http_upgrade;
        proxy_ssl_server_name on;
    }

    # Cache assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
